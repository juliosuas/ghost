version: "3.9"

services:
  ghost:
    build: .
    ports:
      - "${GHOST_PORT:-5000}:5000"
    env_file:
      - .env
    volumes:
      - ghost_data:/app/data
      - ./investigations:/app/investigations
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  ghost_data:
